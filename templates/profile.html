<html lang="ru"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoSync // Профиль пользователя (светлая/тёмная)</title>
    
    <!-- Tailwind + Iconify -->
    <script src="./профиль_files/saved_resource"></script>
    <script src="./профиль_files/iconify-icon.min.js"></script>
    
    <style>
        /* -------------------- ШРИФТЫ -------------------- */
        @import url('https://fonts.googleapis.com/css2?family=Nippo:wght@400;500;700&family=Satoshi:wght@400;500;700&display=swap');

        /* -------------------- ПЕРЕМЕННЫЕ (светлая тема по умолчанию) -------------------- */
        :root {
            --neon-pink: #FF006E;
            --neon-purple: #7B2FDA;        /* фиолетовый для светлой темы */
            --bg-primary: #F5F5F7;
            --text-primary: #1A1A1A;
            --card-bg: rgba(255,255,255,0.95);
            --border-light: rgba(0,0,0,0.1);
            --particle-color: rgba(0,0,0,0.03);
            --scanline-color: rgba(123,47,218,0.03);
            --header-bg: rgba(255,255,255,0.95);
            --footer-bg: to-white;
            --input-bg: rgba(255,255,255,0.9);
            --text-muted: rgba(0,0,0,0.6);
            --stat-card-bg: rgba(0,0,0,0.02);
            --glow-opacity: 0.3;
            --avatar-glow: 0 0 30px rgba(123,47,218,0.3);
        }

        /* -------------------- ТЕМНАЯ ТЕМА -------------------- */
        body.dark-theme {
            --neon-pink: #FF006E;
            --neon-purple: #AA00FF;
            --bg-primary: #050505;
            --text-primary: #FFFFFF;
            --card-bg: rgba(15,15,15,0.95);
            --border-light: rgba(255,255,255,0.1);
            --particle-color: rgba(255,255,255,0.03);
            --scanline-color: rgba(170,0,255,0.04);
            --header-bg: rgba(0,0,0,0.95);
            --footer-bg: to-black;
            --input-bg: rgba(20,20,20,0.9);
            --text-muted: rgba(255,255,255,0.6);
            --stat-card-bg: rgba(255,255,255,0.02);
            --glow-opacity: 0.6;
            --avatar-glow: 0 0 30px rgba(170,0,255,0.6);
        }

        /* -------------------- БАЗОВЫЕ СТИЛИ -------------------- */
        .font-display { font-family: 'Nippo', sans-serif; }
        .font-body { font-family: 'Satoshi', sans-serif; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            overflow-x: hidden;
            font-family: 'Satoshi', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* -------------------- ЧАСТИЦЫ -------------------- */
        .bg-particles {
            background-image: radial-gradient(circle, var(--particle-color) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* -------------------- СКАНИРУЮЩАЯ ЛИНИЯ -------------------- */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, var(--scanline-color) 50%, transparent);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
            animation: scanline-scroll 10s linear infinite;
        }
        @keyframes scanline-scroll {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* -------------------- ЭФФЕКТЫ СВЕЧЕНИЯ -------------------- */
        .glow-purple {
            filter: drop-shadow(0 0 12px color-mix(in srgb, var(--neon-purple) calc(var(--glow-opacity)*100%), transparent));
        }
        .glow-pink {
            filter: drop-shadow(0 0 12px color-mix(in srgb, var(--neon-pink) calc(var(--glow-opacity)*100%), transparent));
        }

        .text-glow-purple {
            text-shadow: 0 0 15px color-mix(in srgb, var(--neon-purple) 50%, transparent), 0 0 30px color-mix(in srgb, var(--neon-purple) 30%, transparent);
        }
        .text-glow-pink {
            text-shadow: 0 0 15px color-mix(in srgb, var(--neon-pink) 50%, transparent), 0 0 30px color-mix(in srgb, var(--neon-pink) 30%, transparent);
        }

        /* -------------------- СВЕЧЕНИЕ ГРАНИЦ -------------------- */
        .border-glow-purple {
            border: 1px solid var(--neon-purple);
            box-shadow: 0 0 15px color-mix(in srgb, var(--neon-purple) 40%, transparent), inset 0 0 10px color-mix(in srgb, var(--neon-purple) 15%, transparent);
        }
        .border-glow-pink {
            border: 1px solid var(--neon-pink);
            box-shadow: 0 0 15px color-mix(in srgb, var(--neon-pink) 40%, transparent), inset 0 0 10px color-mix(in srgb, var(--neon-pink) 15%, transparent);
        }

        /* -------------------- КЛЮЧЕВЫЕ КАДРЫ -------------------- */
        @keyframes rotate-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-rotate-slow { animation: rotate-slow 20s linear infinite; }

        @keyframes float {
            0%, 100% { transform: translate(0,0); }
            50% { transform: translate(-10px,-20px); }
        }
        .animate-float { animation: float 8s ease-in-out infinite; }

        @keyframes bar-grow {
            0% { height: 10%; }
            100% { height: 100%; }
        }
        .bar-animation { animation: bar-grow 2s ease-in-out infinite alternate; }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        .pulse-dot { animation: pulse-soft 2s infinite; }

        @keyframes pulse-glow {
            0% { transform: scale(1); opacity: 0.4; filter: blur(0px); }
            50% { transform: scale(1.1); opacity: 0.7; filter: blur(4px); }
            100% { transform: scale(1); opacity: 0.4; filter: blur(0px); }
        }
        .animate-pulse-glow {
            animation: pulse-glow 4s ease-in-out infinite;
        }

        @keyframes avatar-pulse {
            0%, 100% { box-shadow: var(--avatar-glow); }
            50% { box-shadow: 0 0 50px color-mix(in srgb, var(--neon-purple) 90%, transparent); }
        }

        /* -------------------- КАРТОЧКИ -------------------- */
        .profile-card {
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
        }
        .profile-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .dark-theme .profile-card:hover {
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .stat-card {
            background: var(--stat-card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 20px color-mix(in srgb, var(--neon-purple) 20%, transparent);
        }

        /* -------------------- СТИЛИ ДЛЯ ПОЛЕЙ ВВОДА -------------------- */
        .profile-input {
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            font-family: 'Satoshi', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 0.75rem 1rem;
        }
        .profile-input:focus {
            outline: none;
            border-color: var(--neon-purple);
            box-shadow: 0 0 20px color-mix(in srgb, var(--neon-purple) 30%, transparent);
        }
        .profile-input::placeholder {
            color: var(--text-muted);
            font-size: 16px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* -------------------- АВАТАР -------------------- */
        .avatar-glow {
            box-shadow: var(--avatar-glow);
            animation: avatar-pulse 3s ease-in-out infinite;
        }

        /* -------------------- ПЕРЕКЛЮЧАТЕЛЬ ТЕМ -------------------- */
        .theme-switch {
            position: relative;
            width: 56px;
            height: 28px;
            background: rgba(123,47,218,0.15);
            border: 1px solid var(--neon-purple);
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 20px;
            flex-shrink: 0;
        }
        .theme-switch:hover {
            box-shadow: 0 0 12px var(--neon-purple);
        }
        .theme-switch .switch-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: var(--neon-purple);
            border-radius: 50%;
            transition: transform 0.3s ease;
        }
        .dark-theme .theme-switch .switch-thumb {
            transform: translateX(28px);
        }
        .theme-switch .switch-icon {
            position: absolute;
            top: 5px;
            font-size: 16px;
            pointer-events: none;
        }
        .theme-switch .light-icon { right: 6px; color: #FFD700; }
        .theme-switch .dark-icon  { left: 6px;  color: #fff; opacity: 0.5; }
        .dark-theme .theme-switch .light-icon { opacity: 0.4; }
        .dark-theme .theme-switch .dark-icon  { opacity: 1; }

        /* -------------------- СТИЛИ ДЛЯ ШАПКИ И ПОДВАЛА -------------------- */
        header {
            background: var(--header-bg) !important;
            border-bottom-color: var(--border-light) !important;
        }
        footer {
            background: linear-gradient(to bottom, transparent, var(--footer-bg)) !important;
            border-top-color: var(--border-light) !important;
        }

        /* -------------------- СТИЛИ ДЛЯ ТАБОВ -------------------- */
        .tab-btn {
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab-btn:hover {
            color: var(--neon-purple) !important;
        }
        .tab-btn.active {
            color: var(--neon-purple) !important;
            border-bottom-color: var(--neon-purple) !important;
        }
        .tab-content {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

<!-- Скрипт для переключения темы -->
<script>
    (function() {
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        
        // Проверяем сохраненную тему
        const savedTheme = localStorage.getItem('neosync-theme');
        if (savedTheme === 'dark') {
            body.classList.add('dark-theme');
        }
        
        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                body.classList.toggle('dark-theme');
                
                // Сохраняем выбор
                if (body.classList.contains('dark-theme')) {
                    localStorage.setItem('neosync-theme', 'dark');
                } else {
                    localStorage.setItem('neosync-theme', 'light');
                }
            });
        }
    })();
</script>

<!-- Скрипт загрузки данных профиля -->
<script>
    document.addEventListener('DOMContentLoaded', async function() {
        try {
            const [statusRes, analyticsRes] = await Promise.all([
                fetch('/api/auth/status'),
                fetch('/api/analytics/summary')
            ]);
            
            if (statusRes.ok) {
                const user = await statusRes.json();
                document.getElementById('profileName').textContent = user.name || user.email;
                document.getElementById('profileEmail').textContent = user.email;
                if (document.getElementById('inputName')) document.getElementById('inputName').value = user.name || '';
                if (document.getElementById('inputEmail')) document.getElementById('inputEmail').value = user.email || '';
            }
            
            if (analyticsRes.ok) {
                const analytics = await analyticsRes.json();
                const count = analytics.subscription_count || 0;
                const monthly = (analytics.total_monthly || 0) + ' ₽';
                document.getElementById('profileSubCount').textContent = count;
                document.getElementById('profileMonthly').textContent = monthly;
                document.getElementById('statusSubCount').textContent = count;
                document.getElementById('statusMonthly').textContent = monthly;
            }
        } catch(e) {
            console.error('Error loading profile data:', e);
        }
    });
</script>

<!-- Скрипт для выхода -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', async () => {
                try {
                    const response = await fetch('/logout', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        window.location.href = '/login';
                    } else {
                        console.error('Logout failed');
                    }
                } catch (error) {
                    console.error('Error during logout:', error);
                }
            });
        }
    });
</script>
